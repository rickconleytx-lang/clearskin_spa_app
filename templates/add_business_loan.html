{% extends "base.html" %}

{% block content %}
<h1>Add Business Loan</h1>

<form method="POST">
    <div class="form-group">
        <label for="loan_name">Loan Name</label>
        <input type="text" id="loan_name" name="loan_name" required maxlength="100">
    </div>

    <div class="form-group">
        <label for="lender_name">Lender Name</label>
        <input type="text" id="lender_name" name="lender_name" maxlength="100">
    </div>

    <div class="form-group">
        <label for="loan_start_date">Loan Start Date</label>
        <input type="date" id="loan_start_date" name="loan_start_date">
    </div>

    <div class="form-group">
        <label for="original_amount">Original Amount</label>
        <input type="number" step="0.01" id="original_amount" name="original_amount" required>
    </div>

    <div class="form-group">
        <label for="interest_rate">Interest Rate</label>
        <input type="number" step="0.001" id="interest_rate" name="interest_rate">
    </div>

    <div class="form-group">
        <label for="term_months">Term (Months)</label>
        <input type="number" id="term_months" name="term_months">
    </div>

    <div class="form-group">
        <label for="is_active">Active Loan?</label>
        <select id="is_active" name="is_active">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

    <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="4"></textarea>
    </div>

    <div class="form-buttons">
        <button type="submit" class="btn">Save Loan</button>
        <a href="{{ url_for('loans_home') }}" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
