{% extends "base.html" %}

{% block title %}Add Employee Compensation{% endblock %}

{% block content %}
<h1>Add Employee Compensation</h1>

<form method="POST">

    <div class="form-group">
        <label for="payment_date">Payment Date</label>
        <input type="date"
               id="payment_date"
               name="payment_date"
               required>
    </div>

    <div class="form-group">
        <label for="employee_id">Employee</label>
        <select id="employee_id" name="employee_id" required>
            <option value="">Select Employee</option>
            {% for row in employees %}
                <option value="{{ row[0] }}">{{ row[1] }}</option>
            {% endfor %}
        </select>
    </div>

    <hr>

    <h3>Compensation Lines</h3>

    {% for i in range(1, 5) %}


    <div class="form-row compensation-row">
        <div class="form-group comp-type-group">
            <label for="comp_type_1">Compensation Type 1</label>
            <select id="comp_type_1" name="comp_type_1">
                <option value="">Select Type</option>
                {% for ct in compensation_types %}
                    <option value="{{ ct[0] }}">{{ ct[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group amount-group">
            <label for="amount_1">Amount 1</label>
            <input type="number" step="0.01" id="amount_1" name="amount_1">
        </div>
    </div>

    {% endfor %}

    <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes"
                  name="notes"
                  rows="3"
                  placeholder="Optional notes"></textarea>
    </div>

    <div class="form-buttons">
        <button type="submit" class="btn">Save Compensation</button>

        <a href="{{ url_for('employee_compensation_report') }}" class="btn">
            Cancel
        </a>
    </div>

</form>
{% endblock %}
