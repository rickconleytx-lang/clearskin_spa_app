{% extends "base.html" %}

{% block content %}
<h1>Add Appointment</h1>

<form method="POST">
    <input type="hidden" name="incoming_booking_id" value="{{ incoming_booking_id or '' }}">

    <label for="client_id">Client</label>
    <select name="client_id" required>
        <option value="">Select Client</option>
        {% for client in clients %}
            <option value="{{ client[0] }}" {% if client_id and client_id|string == client[0]|string %}selected{% endif %}>
                {{ client[2] }}, {{ client[1] }}
            </option>
        {% endfor %}
    </select>

    {% if prefill_service_name %}
        <p style="background-color: #e8f4ff; border-left: 5px solid #2b6cb0; padding: 10px; margin: 15px 0;">
            <strong>Square booked service:</strong> {{ prefill_service_name }}
        </p>
    {% endif %}

    <label for="service_id">Service</label>
    <select name="service_id" required>
        <option value="">Select Service</option>
        {% for service in services %}
            <option value="{{ service[0] }}">{{ service[1] }}</option>
        {% endfor %}
    </select>

    <label for="appointment_date">Appointment Date</label>
    <input type="date" name="appointment_date" value="{{ prefill_date or selected_date or '' }}" required>

    <label for="appointment_time">Time</label>
    <input type="time" name="appointment_time" value="{{ prefill_time[:5] if prefill_time else '' }}" required>

<! -- REVIEW LATER:
    <label for="duration_minutes">Duration (minutes)</label>
    <input type="number" id="duration_minutes" name="duration_minutes" placeholder="min">

    <div class="form-row">
        <label for="room_number">Room Number:</label>
        <input type="text" id="room_number" name="room_number" value="Suite 34" class="room-input">
    </div>
-->
    <label for="status">Status</label>
    <select name="status" required>
        <option value="booked" selected>Booked</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
        <option value="no_show">No Show</option>
    </select>

<! -- REVIEW LATER
    <label for="price_at_booking">Price at Booking</label>
    <input type="number" step="0.01" name="price_at_booking">

    <label for="square_appointment_id">Square Appointment ID</label>
    <input type="text" name="square_appointment_id">
-->

    <label for="notes">Notes</label>
    <textarea name="notes" rows="4"></textarea>

    <br><br>
    <button type="submit" class="btn">Save Appointment</button>
    <a href="{{ url_for('appointments') }}" class="btn">Cancel</a>
</form>
{% endblock %}
