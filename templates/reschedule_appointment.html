{% extends "base.html" %}

{% block content %}

<h1>Reschedule Appointment</h1>

<p>
    <strong>Client:</strong>
    {{ appointment[3] }}, {{ appointment[2] }}
</p>

<form method="POST">
    <input type="hidden" name="original_date" value="{{ appointment[5].isoformat() if appointment[5] else '' }}">

    <label for="service_type_id">Service</label>
    <select name="service_type_id" id="service_type_id" required>
        <option value="">Select Service</option>
        {% for service in service_types %}
            <option value="{{ service[0] }}"
                {% if appointment[4] and appointment[4]|string == service[0]|string %}selected{% endif %}>
                {{ service[1] }}
            </option>
        {% endfor %}
    </select>

    <label for="appointment_date">Appointment Date</label>
    <input type="date"
           id="appointment_date"
           name="appointment_date"
           value="{{ appointment[5].isoformat() if appointment[5] else '' }}"
           required>

    <label for="appointment_time">Appointment Time</label>
    <input type="time"
           id="appointment_time"
           name="appointment_time"
           value="{{ appointment[6].strftime('%H:%M') if appointment[6] else '' }}"
           required>

    <label for="status">Status</label>
    <select name="status" id="status" required>
        <option value="booked" {% if appointment[7] == 'booked' %}selected{% endif %}>Booked</option>
        <option value="completed" {% if appointment[7] == 'completed' %}selected{% endif %}>Completed</option>
        <option value="cancelled" {% if appointment[7] == 'cancelled' %}selected{% endif %}>Cancelled</option>
        <option value="no_show" {% if appointment[7] == 'no_show' %}selected{% endif %}>No Show</option>
    </select>

    <label for="notes">Notes</label>
    <textarea name="notes" id="notes" rows="4">{{ appointment[8] or '' }}</textarea>

    <br><br>

    <button type="submit" class="btn">Save Reschedule</button>

    <a href="{{ url_for('daily_schedule', date=appointment[5].isoformat() if appointment[5] else '') }}" class="btn">
        Cancel
    </a>
</form>

{% endblock %}
