{% extends "base.html" %}

{% block title %}Edit Email Template{% endblock %}

{% block content %}
<h1>Edit Email Template</h1>

<div class="form-buttons">
    <a href="{{ url_for('email_templates_admin') }}" class="btn">Back to Templates</a>
</div>

<form method="POST">
    <p>
        <label>Template Name</label><br>
        <input type="text" name="template_name" value="{{ template[1] if template else '' }}" required>
    </p>

    <p>
        <label>Template Type</label><br>
        <input type="text" name="template_type" value="{{ template[2] if template else '' }}" required>
    </p>

    <p>
        <label>Subject Line</label><br>
        <input type="text" name="subject_line" value="{{ template[3] if template else '' }}" required>
    </p>

    <p>
        <label>Body Text</label><br>
        <textarea name="body_text" rows="12" style="width:100%;" required>{{ template[4] if template else '' }}</textarea>
    </p>

    <p>
        <label>
            <input type="checkbox" name="is_active" {% if template and template[5] %}checked{% endif %}>
            Active
        </label>
    </p>

    <button type="submit" class="btn">Save Changes</button>
</form>

{% endblock %}
