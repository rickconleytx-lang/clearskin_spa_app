{% extends "base.html" %}

{% block content %}
<h1>Client Health Profile</h1>

{% if client %}
    <h2>{{ client[1] }} {{ client[2] }}</h2>
{% endif %}

<div style="margin-bottom: 20px;">
    <a href="{{ url_for('client_history') }}" class="btn return-btn">
        ← Return to Client History
    </a>
</div>

<form method="POST" action="{{ url_for('client_health_profile', client_id=client[0]) }}">

    <h3>Basic Information</h3>

    <div>
        <label for="sex">Sex</label><br>
        <select id="sex" name="sex">
            <option value="">-- Select --</option>
            <option value="Female" {% if profile and profile[2] == 'Female' %}selected{% endif %}>Female</option>
            <option value="Male" {% if profile and profile[2] == 'Male' %}selected{% endif %}>Male</option>
            <option value="Other" {% if profile and profile[2] == 'Other' %}selected{% endif %}>Other</option>
        </select>
    </div>

    <div>
        <label for="skin_type_id">Skin Type</label><br>
        <select id="skin_type_id" name="skin_type_id">
            <option value="">-- Select Skin Type --</option>
            {% for row in skin_types %}
                <option value="{{ row[0] }}" {% if profile and profile[1] == row[0] %}selected{% endif %}>
                    {{ row[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label for="fitzpatrick_id">Fitzpatrick Type</label><br>
        <select id="fitzpatrick_id" name="fitzpatrick_id">
            <option value="">-- Select Fitzpatrick Type --</option>
            {% for row in fitzpatrick_types %}
                 <option value="{{ row[0] }}" {% if profile and profile[2] == row[0] %}selected{% endif %}>
                     {% if row[2] %}
                         {{ row[1] }} - {{ row[2] }}
                     {% else %}
                         {{ row[1] }}
                     {% endif %}
                 </option>
             {% endfor %}
        </select>





    </div>

    <h3>Skin / Medical Information</h3>

    <div>
        <label for="skin_concerns">Skin Concerns</label><br>
        <textarea id="skin_concerns" name="skin_concerns" rows="3">{{ profile[5] if profile else '' }}</textarea>
    </div>

    <div>
        <label for="skin_conditions">Skin Conditions</label><br>
        <textarea id="skin_conditions" name="skin_conditions" rows="3">{{ profile[6] if profile else '' }}</textarea>
    </div>

    <div>
        <label for="allergies">Allergies</label><br>
        <textarea id="allergies" name="allergies" rows="3">{{ profile[7] if profile else '' }}</textarea>
    </div>

    <div>
        <label for="medications">Medications</label><br>
        <textarea id="medications" name="medications" rows="3">{{ profile[8] if profile else '' }}</textarea>
    </div>

    <div>
        <label for="current_medical_conditions">Current Medical Conditions</label><br>
        <textarea id="current_medical_conditions" name="current_medical_conditions" rows="3">{{ profile[9] if profile else '' }}</textarea>
    </div>

    <div>
        <label for="past_medical_treatments">Past Medical Treatments</label><br>
        <textarea id="past_medical_treatments" name="past_medical_treatments" rows="3">{{ profile[10] if profile else '' }}</textarea>
    </div>

    <h3>Treatment Contraindications</h3>

    <div>
        <label><input type="checkbox" name="recent_injections" {% if profile and profile[11] %}checked{% endif %}> Recent Injections</label>
    </div>

    <div>
        <label><input type="checkbox" name="recent_laser" {% if profile and profile[12] %}checked{% endif %}> Recent Laser</label>
    </div>

    <div>
        <label><input type="checkbox" name="pregnant" {% if profile and profile[13] %}checked{% endif %}> Pregnant</label>
    </div>

    <div>
        <label><input type="checkbox" name="nursing" {% if profile and profile[14] %}checked{% endif %}> Nursing</label>
    </div>

    <div>
        <label><input type="checkbox" name="using_retinol" {% if profile and profile[15] %}checked{% endif %}> Using Retinol</label>
    </div>

    <div>
        <label><input type="checkbox" name="using_accutane" {% if profile and profile[16] %}checked{% endif %}> Using Accutane</label>
    </div>

    <h3>Additional Information</h3>

    <div>
        <label for="sun_exposure_level">Sun Exposure Level</label><br>
        <input type="text" id="sun_exposure_level" name="sun_exposure_level" value="{{ profile[17] if profile else '' }}">
    </div>

    <div>
        <label for="last_facial_date">Last Facial Date</label><br>
        <input type="date" id="last_facial_date" name="last_facial_date" value="{{ profile[18] if profile and profile[18] else '' }}">
    </div>

    <div>
        <label for="notes1">Notes 1</label><br>
        <textarea id="notes1" name="notes1" rows="3">{{ profile[19] if profile else '' }}</textarea>
    </div>

    <div>
        <label for="notes2">Notes 2</label><br>
        <textarea id="notes2" name="notes2" rows="3">{{ profile[20] if profile else '' }}</textarea>
    </div>

    <div>
        <label for="notes3">Notes 3</label><br>
        <textarea id="notes3" name="notes3" rows="3">{{ profile[21] if profile else '' }}</textarea>
    </div>

    <br>
    <button type="submit" class="btn">Save Health Profile</button>
    <a class="btn" href="{{ url_for('client_history_detail_two', client_id=client[0]) }}">Cancel</a>
</form>
{% endblock %}
