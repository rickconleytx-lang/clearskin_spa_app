{% extends "base.html" %}

{% block title %}Edit Employee Compensation{% endblock %}

{% block content %}
<h1>Edit Employee Compensation</h1>

<form method="POST">
    <div class="form-group">
        <label for="payment_date">Payment Date</label>
        <input type="date"
               id="payment_date"
               name="payment_date"
               value="{{ compensation[2].strftime('%Y-%m-%d') if compensation[2] else '' }}"
               required>
    </div>

    <div class="form-group">
        <label for="employee_id">Employee</label>
        <select name="employee_id" id="employee_id" required>
            <option value="">Select Employee</option>
            {% for emp in employees %}
                <option value="{{ emp[0] }}" {% if compensation[1] == emp[0] %}selected{% endif %}>
                    {{ emp[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <h3>Compensation Lines</h3>

    {% for i in range(4) %}
    <div class="form-row" style="margin-bottom: 12px;">
        <div class="form-group">
            <label for="comp_type_{{ i + 1 }}">Compensation Type {{ i + 1 }}</label>
            <select name="comp_type_{{ i + 1 }}" id="comp_type_{{ i + 1 }}">
                <option value="">Select Type</option>
                {% for ct in compensation_types %}
                    <option value="{{ ct[0] }}"
                        {% if detail_rows[i][0] == ct[0] %}selected{% endif %}>
                        {{ ct[1] }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="amount_{{ i + 1 }}">Amount {{ i + 1 }}</label>
            <input type="number"
                   step="0.01"
                   name="amount_{{ i + 1 }}"
                   id="amount_{{ i + 1 }}"
                   value="{{ detail_rows[i][1] }}">
        </div>
    </div>
    {% endfor %}

    <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="4">{{ compensation[3] or '' }}</textarea>
    </div>

    <div class="form-buttons">
        <button type="submit" class="btn">Save Changes</button>
        <a href="{{ url_for('employee_compensation_history') }}" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
