{% extends "base.html" %}

{% block title %}Leave Feedback{% endblock %}

{% block content %}
<h1>Leave Feedback</h1>

<div class="form-container">
    <p>
        Found an error? Something confusing? Have a suggestion?
        Please let us know below.
    </p>

    <form method="POST">
        <div class="form-group">
            <label for="user_name">Your Name (optional)</label>
            <input type="text" id="user_name" name="user_name">
        </div>

        <div class="form-group">
            <label for="page_name">Page</label>
            <input type="text" id="page_name" name="page_name" value="{{ page_name }}" readonly>
        </div>

        <div class="form-group">
            <label for="feedback_type">Feedback Type</label>
            <select id="feedback_type" name="feedback_type" required>
                <option value="">Select Type</option>
                <option value="Bug">Bug</option>
                <option value="UX Issue">UX Issue</option>
                <option value="Feature Request">Feature Request</option>
                <option value="Navigation Issue">Navigation Issue</option>
                <option value="General Feedback">General Feedback</option>
            </select>
        </div>

        <div class="form-group">
            <label for="severity">Severity</label>
            <select id="severity" name="severity">
                <option value="">Select Severity</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">What happened / what would you like changed?</label>
            <textarea id="message" name="message" rows="8" required></textarea>
        </div>

        <div class="form-buttons">
            <button type="submit" class="btn">Submit Feedback</button>
            <a href="{{ url_for('dashboard') }}" class="btn">Back to Dashboard</a>
        </div>
    </form>
</div>
{% endblock %}
