{% extends "base.html" %}

{% block content %}
<h1>Edit Owner Contribution</h1>

<form method="POST">
    <div class="form-group">
        <label for="contribution_date">Contribution Date</label>
        <input type="date"
               id="contribution_date"
               name="contribution_date"
               value="{{ contribution[1].strftime('%Y-%m-%d') if contribution[1] else '' }}"
               required>
    </div>

    <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number"
               step="0.01"
               id="amount"
               name="amount"
               value="{{ contribution[2] }}"
               required>
    </div>

    <div class="form-group">
        <label for="funding_source">Funding Source</label>
        <input type="text"
               id="funding_source"
               name="funding_source"
               maxlength="100"
               value="{{ contribution[3] or '' }}">
    </div>

    <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="4">{{ contribution[4] or '' }}</textarea>
    </div>

    <div class="form-buttons">
        <button type="submit" class="btn">Update Contribution</button>
        <a href="{{ url_for('funding_home') }}" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
