{% extends "base.html" %}

{% block title %}Appointment Status{% endblock %}

{% block content %}

<h1>Skin Types</h1>

<form method="POST" style="margin-bottom: 20px;">
    <input type="text" name="Appointment_Status" placeholder="Enter new Appointment Statuse" required>
    <button type="submit">Add Appointment Status</button>
    <a class="btn cancel-btn" href="{{ url_for('admin') }}">Back to Admin</a>
</form>

<table>
    <tr>
        <th>ID</th>
        <th>status_name</th>
        <th>Delete</th>
    </tr>

    {% for row in rows %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>
            <form method="POST"
                  action="{{ url_for('delete_appointment_status', status_id=row[0]) }}"
                  onsubmit="return confirm('Are you sure you want to delete this Appointment Status?');"
                  style="display:inline;">
                <button type="submit" class="delete-btn">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
