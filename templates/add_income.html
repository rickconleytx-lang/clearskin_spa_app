{% extends "base.html" %}

{% block content %}
<h1>Add Income</h1>

<p><strong>Client:</strong> {{ appt[4] }} {{ appt[5] }}</p>
<p><strong>Appointment Date:</strong> {{ appt[2].strftime('%Y-%m-%d') }}</p>
<p><strong>Appointment Time:</strong> {{ appt[3].strftime('%I:%M %p') }}</p>

<span style="color: red; font-size: x-small;">* Required Field</span>

<form method="POST">
    <label for="income_date">Income Date<span style="color: red;"> *</span></label>
    <input type="date" id="income_date" name="income_date"
           value="{{ appt[2].strftime('%Y-%m-%d') }}" required>

    <label for="income_type">Income Type<span style="color: red;"> *</span></label>
    <select id="income_type" name="income_type" required>
        <option value="Service">Service</option>
        <option value="Retail">Retail</option>
        <option value="Service + Retail">Service + Retail</option>
    </select>

    <label for="description">Description</label>
    <input type="text" id="description" name="description"
           placeholder="Signature Facial, Product Sale, etc.">

    <div class="form-group">
        <label for="employee_id">Employee<span style="color: red;"> *</span></label>
        <select name="employee_id" id="employee_id" required>
            <option value="">Select Employee</option>
            {% for emp in employees %}
                <option value="{{ emp[0] }}">{{ emp[1] }}</option>
            {% endfor %}
        </select>
    </div>

    <label for="service_amount">Service Amount</label>
    <input type="number" step="0.01" id="service_amount" name="service_amount" placeholder="0.00">

    <label for="retail_amount">Retail Amount</label>
    <input type="number" step="0.01" id="retail_amount" name="retail_amount" placeholder="0.00">

    <label for="available_credit">Available Credit</label>
    <input type="number" step="0.01" id="available_credit" name="available_credit"
       value="{{ '%.2f'|format(credit_balance or 0) }}" readonly>

    <label for="credit_applied">Credit Applied</label>
    <input type="number" step="0.01" min="0" id="credit_applied" name="credit_applied" value="0.00">

    <label for="tax_amount">Tax Amount</label>
    <input type="number" step="0.01" id="tax_amount" name="tax_amount" placeholder="0.00">

    <label for="tip_amount">Tip Amount</label>
    <input type="number" step="0.01" id="tip_amount" name="tip_amount" placeholder"0.00">

    <label for="total_amount">Total Amount</label>
    <input type="number" step="0.01" id="total_amount" name="total_amount" value="0.00" readonly required>

    <label for="payment_method">Payment Method</label>
    <select id="payment_method" name="payment_method" required>
        <option value="">Select Payment Method</option>
        <option value="Cash">Cash</option>
        <option value="Card">Card</option>
        <option value="Apple Pay">Apple Pay</option>
        <option value="Google Pay">Google Pay</option>
        <option value="Square">Square</option>
        <option value="Other">Other</option>
    </select>

    <div id="credit_processor_group" style="display: none;">
        <label for="credit_processor_id">Credit Processor</label>
        <select id="credit_processor_id" name="credit_processor_id">
            <option value="">Select Processor</option>
            {% for processor in credit_processors %}
                <option value="{{ processor[0] }}">{{ processor[1] }}</option>
            {% endfor %}
        </select>
    </div>

    <div id="processor_payment_group" style="display: none;">
        <label for="processor_payment_id">Payment Processor Payment ID</label>
        <input type="text" id="processor_payment_id" name="processor_payment_id">
    </div>

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="4"></textarea>

    <br><br>
    <button type="submit" class="btn">Save Income</button>
    <a href="{{ url_for('daily_schedule', date=appt[2].strftime('%Y-%m-%d')) }}" class="btn">Cancel</a>
</form>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const serviceField = document.getElementById("service_amount");
    const retailField = document.getElementById("retail_amount");
    const taxField = document.getElementById("tax_amount");
    const tipField = document.getElementById("tip_amount");
    const creditAppliedField = document.getElementById("credit_applied");
    const availableCreditField = document.getElementById("available_credit");
    const totalField = document.getElementById("total_amount");

    const paymentMethodField = document.getElementById("payment_method");
    const creditProcessorGroup = document.getElementById("credit_processor_group");
    const creditProcessorField = document.getElementById("credit_processor_id");
    const processorPaymentGroup = document.getElementById("processor_payment_group");

    function calculateTotal() {
        const service = parseFloat(serviceField.value) || 0;
        const retail = parseFloat(retailField.value) || 0;
        const tax = parseFloat(taxField.value) || 0;
        const tip = parseFloat(tipField.value) || 0;
        const availableCredit = parseFloat(availableCreditField.value) || 0;
        let creditApplied = parseFloat(creditAppliedField.value) || 0;

        const discountableTotal = service + retail;

        if (creditApplied < 0) {
            creditApplied = 0;
        }

        if (creditApplied > availableCredit) {
            creditApplied = availableCredit;
        }

        if (creditApplied > discountableTotal) {
            creditApplied = discountableTotal;
        }

        creditAppliedField.value = creditApplied.toFixed(2);

        const total = service + retail + tax + tip - creditApplied;
        totalField.value = total.toFixed(2);
    }

    function togglePaymentFields() {
        const paymentMethod = paymentMethodField.value.trim().toLowerCase();
        const cardBasedMethods = ["card", "apple pay", "google pay", "square"];

        if (cardBasedMethods.includes(paymentMethod)) {
            creditProcessorGroup.style.display = "block";
            processorPaymentGroup.style.display = "block";
        } else {
            creditProcessorGroup.style.display = "none";
            creditProcessorField.value = "";
            processorPaymentGroup.style.display = "none";
            document.getElementById("processor_payment_id").value = "";
        }
    }

    serviceField.addEventListener("input", calculateTotal);
    retailField.addEventListener("input", calculateTotal);
    taxField.addEventListener("input", calculateTotal);
    tipField.addEventListener("input", calculateTotal);
    creditAppliedField.addEventListener("input", calculateTotal);

    paymentMethodField.addEventListener("change", togglePaymentFields);

    calculateTotal();
    togglePaymentFields();
});
</script>



{% endblock %}
